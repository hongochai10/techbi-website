<svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primary-flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF9D" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#00FF9D" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="secondary-flow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b026ff" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#0033FF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#b026ff" stop-opacity="0.9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, 25)">
    <!-- Shadow Layer for 3D depth -->
    <g opacity="0.4" transform="translate(1, 2)">
      <path
        d="M 25 10 C 15 10, 10 15, 10 25 C 10 35, 15 40, 25 40 C 35 40, 40 30, 50 25 C 60 20, 65 10, 75 10 C 85 10, 90 15, 90 25 C 90 35, 85 40, 75 40 C 65 40, 60 30, 50 25"
        stroke="black"
        stroke-width="3.5"
        stroke-linecap="round"
      />
      <path
        d="M 25 10 C 35 10, 40 20, 50 25"
        stroke="black"
        stroke-width="3.5"
        stroke-linecap="round"
      />
      <path
        d="M 50 25 C 40 30, 35 40, 25 40"
        stroke="black"
        stroke-width="3.5"
        stroke-linecap="round"
      />
    </g>

    <!-- Base Track (Subtle glowing background lane) -->
    <path
      d="M 25 10 C 15 10, 10 15, 10 25 C 10 35, 15 40, 25 40 C 35 40, 40 30, 50 25 C 60 20, 65 10, 75 10 C 85 10, 90 15, 90 25 C 90 35, 85 40, 75 40 C 65 40, 60 30, 50 25 M 25 10 C 35 10, 40 20, 50 25 M 50 25 C 40 30, 35 40, 25 40"
      stroke="rgba(0,255,157, 0.25)"
      stroke-width="6"
      stroke-linecap="round"
    />

    <!-- Primary Circuit Path (Front overpass) -->
    <path
      d="M 50 25 C 40 30, 35 40, 25 40 C 15 40, 10 35, 10 25 C 10 15, 15 10, 25 10 C 35 10, 40 20, 46 23.5"
      stroke="url(#primary-flow)"
      stroke-width="3.5"
      stroke-linecap="round"
      filter="url(#glow)"
    />
    
    <!-- Secondary Circuit Path (Back underpass) -->
    <path
      d="M 25 10 C 35 10, 40 20, 50 25 C 60 30, 65 40, 75 40 C 85 40, 90 35, 90 25 C 90 15, 85 10, 75 10 C 65 10, 60 20, 54 23.5"
      stroke="url(#secondary-flow)"
      stroke-width="2.5"
      stroke-linecap="round"
    />

    <!-- Digital Nodes (Circuit Dots) -->
    <!-- Left cluster -->
    <circle cx="20" cy="12" r="2.5" fill="#00FF9D" filter="url(#glow)" />
    <circle cx="12" cy="20" r="1.5" fill="#00FF9D" />
    <circle cx="15" cy="35" r="2" fill="#0055FF" />
    <circle cx="32" cy="14" r="1.5" fill="#00FF9D" />
    
    <!-- Right cluster -->
    <circle cx="80" cy="12" r="2.5" fill="#b026ff" filter="url(#glow)" />
    <circle cx="88" cy="20" r="1.5" fill="#0033FF" />
    <circle cx="85" cy="35" r="2" fill="#b026ff" />
    <circle cx="68" cy="14" r="1.5" fill="#b026ff" />

    <!-- Center connection nodes -->
    <circle cx="43" cy="21.5" r="1.2" fill="#00FF9D" />
    <circle cx="57" cy="28.5" r="1.2" fill="#0055FF" />

    <!-- Inner Traces (Sharp circuit lines branching) -->
    <!-- Left inside trace -->
    <path d="M 20 12 L 23 15 L 29 15 L 32 14" stroke="#00FF9D" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 12 20 L 15 20 L 18 25 L 15 35" stroke="#0055FF" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Right inside trace -->
    <path d="M 80 12 L 77 15 L 71 15 L 68 14" stroke="#b026ff" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 88 20 L 85 20 L 82 25 L 85 35" stroke="#0033FF" stroke-width="1" fill="none" opacity="0.6"/>
  </g>
</svg>
